<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sa Akhran® · Analyze Engine</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            max-width: 850px;
            margin: auto;
            font-size: 18px;
        }
        header {
            border-bottom: 2px solid #30363d;
            padding: 15px 0;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 { color: #58a6ff; font-size: 2.2rem; }
        .back-btn {
            background: #161b22;
            border: 2px solid #30363d;
            padding: 8px 18px;
            border-radius: 8px;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 1rem;
        }
        .back-btn:hover { border-color: #58a6ff; color: #58a6ff; }
        .card {
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            margin: 20px 0;
        }
        input, button {
            font-size: 1.2rem;
            padding: 12px;
            width: 100%;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #2ea44f; }
        #result {
            margin-top: 15px;
            padding: 15px;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border-bottom: 1px solid #30363d;
            padding: 8px 5px;
            text-align: left;
        }
        th { color: #58a6ff; }
        .footer {
            margin-top: 40px;
            border-top: 2px solid #30363d;
            padding: 15px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <header>
        <h1>🧠 Sa Akhran® Engine</h1>
        <a href="index.html" class="back-btn">← Back</a>
    </header>

    <div class="card">
        <h2>Enter a system query</h2>
        <p style="color:#8b949e; font-size:0.9rem;">
            Example: "Check USB drive for virus" or "Analyze network packet 443"
        </p>
        <input type="text" id="queryInput" placeholder="e.g. Suspicious file detected on boot sector">
        <button id="analyzeBtn">▶ Classify & Analyze</button>
    </div>

    <div class="card">
        <h3>Classification Result</h3>
        <div id="result">Awaiting query...</div>
    </div>

    <div class="footer">All rights reserved · Sa Akhran® · Seliim Ahmed</div>

    <script>
        // ================================================================
        // 1. THE 36 GROUPS (NOW WITH GROUP 0 AS FALLBACK)
        // ================================================================
        const GROUPS = {
            0: { name: 'General System Inquiry', domain: 'unknown', trait: 'Unclassified' },
            1: { name: 'Boot Loader', domain: 'kernel', trait: 'Root-Trust Only' },
            2: { name: 'Kernel Core', domain: 'kernel', trait: 'Root-Trust Only' },
            3: { name: 'Device Drivers', domain: 'kernel', trait: 'Root-Trust Only' },
            4: { name: 'System Registry', domain: 'kernel', trait: 'Root-Trust Only' },
            5: { name: 'BIOS/UEFI', domain: 'kernel', trait: 'Root-Trust Only' },
            6: { name: 'Boot Configuration', domain: 'kernel', trait: 'Root-Trust Only' },
            7: { name: 'Portable Executables', domain: 'executable', trait: 'Hash-Anchored' },
            8: { name: 'Dynamic Libraries', domain: 'executable', trait: 'Hash-Anchored' },
            9: { name: 'Scripts (JS/Python)', domain: 'executable', trait: 'Hash-Anchored' },
            10: { name: 'Macros', domain: 'executable', trait: 'Hash-Anchored' },
            11: { name: 'APK/IPA', domain: 'executable', trait: 'Hash-Anchored' },
            12: { name: 'Firmware Updates', domain: 'executable', trait: 'Hash-Anchored' },
            13: { name: 'Inbound TCP', domain: 'network', trait: 'Temporal-Flow' },
            14: { name: 'Outbound TCP', domain: 'network', trait: 'Temporal-Flow' },
            15: { name: 'Inbound UDP', domain: 'network', trait: 'Temporal-Flow' },
            16: { name: 'Outbound UDP', domain: 'network', trait: 'Temporal-Flow' },
            17: { name: 'ICMP/Ping', domain: 'network', trait: 'Temporal-Flow' },
            18: { name: 'DNS Queries', domain: 'network', trait: 'Temporal-Flow' },
            19: { name: 'Keyboard Input', domain: 'ui', trait: 'Context-Aware' },
            20: { name: 'Mouse/Touch', domain: 'ui', trait: 'Context-Aware' },
            21: { name: 'Voice Commands', domain: 'ui', trait: 'Context-Aware' },
            22: { name: 'Camera Feed', domain: 'ui', trait: 'Context-Aware' },
            23: { name: 'Clipboard Data', domain: 'ui', trait: 'Context-Aware' },
            24: { name: 'Form Submissions', domain: 'ui', trait: 'Context-Aware' },
            25: { name: 'Internal Flash', domain: 'storage', trait: 'Spatial-Mapping' },
            26: { name: 'External SD Card', domain: 'storage', trait: 'Spatial-Mapping' },
            27: { name: 'USB Drives', domain: 'storage', trait: 'Spatial-Mapping' },
            28: { name: 'Cloud Volumes', domain: 'storage', trait: 'Spatial-Mapping' },
            29: { name: 'Temp Cache', domain: 'storage', trait: 'Spatial-Mapping' },
            30: { name: 'Swap/Pagefile', domain: 'storage', trait: 'Spatial-Mapping' },
            31: { name: 'Unusual CPU Spikes', domain: 'anomaly', trait: 'Bayesian-Predictive' },
            32: { name: 'Memory Leaks', domain: 'anomaly', trait: 'Bayesian-Predictive' },
            33: { name: 'I/O Bottlenecks', domain: 'anomaly', trait: 'Bayesian-Predictive' },
            34: { name: 'Permission Escalation', domain: 'anomaly', trait: 'Bayesian-Predictive' },
            35: { name: 'Encrypted Ransomware', domain: 'anomaly', trait: 'Bayesian-Predictive' },
            36: { name: 'Unknown Outbound Calls', domain: 'anomaly', trait: 'Bayesian-Predictive' }
        };

        // ================================================================
        // 2. NOISE FILTER
        // ================================================================
        function isRelevantQuery(input) {
            const keywords = [
                'file', 'process', 'network', 'packet', 'kernel', 'memory',
                'storage', 'disk', 'usb', 'boot', 'execute', 'script',
                'malware', 'virus', 'spam', 'permission', 'encrypt',
                'connection', 'socket', 'port', 'registry', 'cache',
                'heap', 'stack', 'cpu', 'gpu', 'ram'
            ];
            const lower = input.toLowerCase();
            return keywords.some(kw => lower.includes(kw));
        }

        // ================================================================
        // 3. CLASSIFIER (FALLBACK = GROUP 0, NOT USB)
        // ================================================================
        function classifyQuery(input) {
            const lower = input.toLowerCase();
            let matched = [];

            for (let id in GROUPS) {
                const g = GROUPS[id];
                const domainMatch = lower.includes(g.domain);
                const nameMatch = lower.includes(g.name.toLowerCase());
                const traitWords = g.trait.toLowerCase().split(/[-\s]+/);
                const traitMatch = traitWords.some(word => lower.includes(word));

                if (domainMatch || nameMatch || traitMatch) {
                    matched.push({ id: parseInt(id), ...g });
                }
            }

            // FIX: Fallback to Group 0 (General System Inquiry) instead of USB
            if (matched.length === 0) {
                matched.push({ id: 0, ...GROUPS[0] });
            }
            return matched;
        }

        // ================================================================
        // 4. VOICE OF BRAHMA (Ternary: -1, 0, +1)
        // ================================================================
        function voiceOfBrahma(query, group) {
            const lower = query.toLowerCase();

            const malIndicators = [
                'virus', 'malware', 'trojan', 'ransom', 'spam', 'phish',
                'exploit', 'inject', 'buffer overflow', 'backdoor', 'keylog'
            ];
            const safeIndicators = [
                'trusted', 'signature', 'verified', 'official', 'update',
                'security', 'patch', 'backup'
            ];

            let malScore = malIndicators.filter(w => lower.includes(w)).length;
            let safeScore = safeIndicators.filter(w => lower.includes(w)).length;

            // Group bias
            if (group.trait === 'Root-Trust Only' || group.trait === 'Hash-Anchored') {
                safeScore += 2;
            }
            if (group.trait === 'Bayesian-Predictive') {
                malScore += 1;
            }

            if (malScore > safeScore) return -1;
            if (safeScore > malScore) return 1;
            return 0;
        }

        // ================================================================
        // 5. ENIGMA TRANSLATOR
        // ================================================================
        function enigmaTranslator(query, groups, ternaries) {
            if (!isRelevantQuery(query)) {
                return {
                    output: 'VOID: Irrelevant query.',
                    html: `<p style="color:#f85149;">🚫 VOID: This query does not relate to system security.</p>`
                };
            }

            let overall = 0;
            let rows = '';

            groups.forEach((g, idx) => {
                const state = ternaries[idx];
                overall += state;

                let label, color;
                if (state === 1) { label = '✅ SAFE'; color = '#3fb950'; }
                else if (state === -1) { label = '❌ MALICIOUS'; color = '#f85149'; }
                else { label = '⚪ NEUTRAL'; color = '#d29922'; }

                rows += `<tr>
                    <td>${g.id}</td>
                    <td>${g.name}</td>
                    <td>${g.domain}</td>
                    <td>${g.trait}</td>
                    <td><strong style="color:${color}">${label}</strong></td>
                </tr>`;
            });

            let verdict, verdictColor;
            if (overall > 0) { verdict = '✅ OVERALL: SAFE'; verdictColor = '#3fb950'; }
            else if (overall < 0) { verdict = '🚨 OVERALL: MALICIOUS'; verdictColor = '#f85149'; }
            else { verdict = '⚠️ OVERALL: NEUTRAL (Review required)'; verdictColor = '#d29922'; }

            const html = `
                <div style="background:#0d1117; padding:10px; border-radius:6px;">
                    <p><strong>Query:</strong> "${query}"</p>
                    <hr style="border-color:#30363d; margin:10px 0;">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th><th>Name</th><th>Domain</th><th>Trait</th><th>Verdict</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <hr style="border-color:#30363d; margin:10px 0;">
                    <h2 style="color:${verdictColor};">${verdict}</h2>
                    <p style="color:#8b949e; font-size:12px; margin-top:10px;">
                        All rights reserved · Seliim Ahmed · amit.khanna.1082@gmail.com
                    </p>
                </div>
            `;

            return { output: verdict, html };
        }

        // ================================================================
        // 6. MAIN PROCESSOR
        // ================================================================
        function processQuery(inputQuery) {
            if (!isRelevantQuery(inputQuery)) {
                return {
                    status: 'NOISE_REJECTED',
                    html: `<p style="color:#f85149;">🚫 VOID: Query discarded (irrelevant).</p>`
                };
            }

            const matchedGroups = classifyQuery(inputQuery);
            const ternaries = matchedGroups.map(g => voiceOfBrahma(inputQuery, g));
            const result = enigmaTranslator(inputQuery, matchedGroups, ternaries);

            return {
                status: 'PROCESSED',
                html: result.html,
                verdict: result.output
            };
        }

        // ================================================================
        // 7. UI BINDING
        // ================================================================
        document.getElementById('analyzeBtn').addEventListener('click', function() {
            const input = document.getElementById('queryInput').value.trim();
            const resultDiv = document.getElementById('result');

            if (!input) {
                resultDiv.innerHTML = '<p style="color:#f85149;">⚠️ Please enter a query.</p>';
                return;
            }

            const output = processQuery(input);
            resultDiv.innerHTML = output.html;
        });

        document.getElementById('queryInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('analyzeBtn').click();
            }
        });
    </script>
</body>
</html>
