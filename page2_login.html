<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sa-marduk-V9 · Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            max-width: 700px;
            margin: auto;
            font-size: 20px;
        }
        header { border-bottom: 2px solid #30363d; padding: 15px 0; margin-bottom: 25px; }
        h1 { color: #58a6ff; font-size: 2.2rem; }
        .back-btn {
            background: #161b22;
            border: 2px solid #30363d;
            padding: 10px 20px;
            border-radius: 8px;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 1rem;
            display: inline-block;
            margin-bottom: 15px;
        }
        .back-btn:hover { border-color: #58a6ff; color: #58a6ff; }
        .card {
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            margin: 20px 0;
        }
        input, button {
            font-size: 1.2rem;
            padding: 15px;
            width: 100%;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #2ea44f; }
        .msg { margin: 10px 0; font-weight: bold; font-size: 1.2rem; }
        .traffic-item {
            padding: 12px 0;
            border-bottom: 1px solid #30363d;
            font-size: 1.1rem;
        }
        .traffic-item:last-child { border-bottom: none; }
        footer {
            margin-top: 40px;
            border-top: 2px solid #30363d;
            padding: 15px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔐 Login</h1>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </header>

    <div class="card">
        <h2 style="font-size:1.8rem;">Save your credentials</h2>
        <form id="loginForm">
            <input type="text" id="userName" placeholder="Full Name" required>
            <input type="tel" id="userPhone" placeholder="Phone Number" required>
            <button type="submit">💾 Save Login</button>
        </form>
        <div id="loginMsg" class="msg"></div>
    </div>

    <div class="card">
        <h2 style="font-size:1.8rem;">📋 Traffic Log</h2>
        <div id="trafficList"></div>
    </div>

    <footer>All rights reserved · Sa Akhran®</footer>

    <script>
        // ----- Database: localStorage -----
        const DB_KEY = 'sa_logins';

        function getLogins() {
            const data = localStorage.getItem(DB_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveLogin(name, phone) {
            const logins = getLogins();
            logins.push({ name, phone, timestamp: new Date().toISOString() });
            localStorage.setItem(DB_KEY, JSON.stringify(logins));
        }

        function renderTraffic() {
            const logins = getLogins();
            const container = document.getElementById('trafficList');
            if (logins.length === 0) {
                container.innerHTML = '<p style="color:#8b949e;">No logins yet.</p>';
                return;
            }
            // Show latest first
            const reversed = logins.slice().reverse();
            let html = '';
            reversed.forEach(entry => {
                const time = new Date(entry.timestamp).toLocaleString();
                html += `<div class="traffic-item">${entry.name} (${entry.phone}) – ${time}</div>`;
            });
            container.innerHTML = html;
        }

        // Form submit
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const msg = document.getElementById('loginMsg');
            if (!name || !phone) {
                msg.textContent = '❌ Both fields required.';
                msg.style.color = '#f85149';
                return;
            }
            saveLogin(name, phone);
            msg.textContent = '✅ Saved successfully!';
            msg.style.color = '#3fb950';
            document.getElementById('userName').value = '';
            document.getElementById('userPhone').value = '';
            renderTraffic();
            // Auto-clear message after 3s
            setTimeout(() => { msg.textContent = ''; }, 3000);
        };

        // Initial render
        renderTraffic();
    </script>
</body>
</html>
