<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sa-marduk-V9 · Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>Dashboard</h1>
        <a href="index.html">← Back</a>
    </header>

    <section>
        <p>System overview – placeholder for future integration.</p>
        <div>Connected drives: <span id="drives">--</span></div>
        <div>Active sessions: <span id="sessions">--</span></div>
    </section>

    <footer>
        <p>All rights reserved · Sa Akhran®</p>
    </footer>

    <script src="assets/js/app.js"></script>
    <script>
        fetch('/api/dashboard')
            .then(r => r.json())
            .then(d => {
                document.getElementById('drives').innerText = d.drives || 'N/A';
                document.getElementById('sessions').innerText = d.sessions || '0';
            })
            .catch(() => {});
    </script>
</body>
</html>
