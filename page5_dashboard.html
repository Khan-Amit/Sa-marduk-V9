<h3>Login Traffic</h3>
<ul id="dashboardTraffic"></ul>
<script>
const db = JSON.parse(localStorage.getItem('sa_traffic_db') || '[]');
const ul = document.getElementById('dashboardTraffic');
db.forEach(entry => {
    const li = document.createElement('li');
    li.textContent = `${entry.name} (${entry.phone}) – ${entry.time}`;
    ul.appendChild(li);
});
</script>
